sensor:
  - platform: uptime
    name: "Час роботи"
    update_interval: 60s

  - platform: wifi_signal
    name: "WiFi сигнал"
    update_interval: 60s

  - platform: internal_temperature
    name: "Температура процесора"
    update_interval: 60s

  - platform: homeassistant
    id: outside_temp
    entity_id: sensor.vulitsia_t_h_a_temperature

  - platform: homeassistant
    id: outside_humidity
    entity_id: sensor.vulitsia_t_h_a_humidity

  - platform: homeassistant
    id: weather_wind_speed
    entity_id: weather.forecast_home
    attribute: wind_speed

binary_sensor:
  - platform: homeassistant
    id: air_alert
    entity_id: binary_sensor.m_kiiv_air

text_sensor:
  - platform: homeassistant
    id: weather_state
    entity_id: weather.forecast_home

  - platform: wifi_info
    ip_address:
      name: "IP адреса"
    ssid:
      name: "Підключено до"

  - platform: version
    name: "Версія ESPHome"
    hide_timestamp: true

button:
  - platform: restart
    name: "Перезавантаження"
    icon: "mdi:restart"

image:
  - file: mdi:weather-sunny
    id: icon_weather_sunny
    resize: 80x80
    type: binary
  - file: mdi:clouds
    id: icon_weather_cloudy
    resize: 80x80
    type: binary
  - file: mdi:weather-rainy
    id: icon_weather_rainy
    resize: 80x80
    type: binary
  - file: mdi:weather-snowy
    id: icon_weather_snowy
    resize: 80x80
    type: binary
  - file: mdi:weather-lightning
    id: icon_weather_lightning
    resize: 80x80
    type: binary
  - file: mdi:water-percent
    id: icon_weather_humidity
    resize: 26x26
    type: binary
  - file: mdi:weather-windy
    id: icon_weather_windy
    resize: 26x26
    type: binary
  - file: mdi:rocket-launch-outline
    id: icon_rocket_launch
    resize: 20x20
    type: binary

display:
  - platform: mipi_spi
    model: ST7789V
    dimensions:
      width: 240
      height: 320
      offset_width: 0
      offset_height: 0
    rotation: 0
    cs_pin: GPIO12
    dc_pin: GPIO11
    reset_pin: GPIO10
    color_order: rgb
    spi_mode: MODE3
    data_rate: 10MHz
    color_depth: 16
    buffer_size: 20%
    invert_colors: true
    update_interval: 1s
    lambda: |-

      Color bg = id(air_alert).state ? Color(0, 0, 37) : Color::BLACK;
      it.fill(bg);

      if (id(air_alert).state) {
        it.image(10, 12, id(icon_rocket_launch), Color(255, 80, 80), bg);
        it.printf(35, 12, id(cyr_small), Color(255, 80, 80), "ТРИВОГА");
      } else { 
        it.image(10, 12, id(icon_rocket_launch), Color(180, 180, 180), bg);
        it.printf(35, 12, id(cyr_small), Color(180, 180, 180), "Безпечно");
      }

      it.line(10, 40, 230, 40, Color(80, 80, 80));

      it.image(10, 153, id(icon_weather_humidity), Color(215, 185, 155), bg);

      if (!isnan(id(outside_temp).state)) {
        it.printf(100, 70, id(large), Color(200, 200, 200), "%.1f°", id(outside_temp).state);
      } else {
        it.printf(100, 100, id(medium), Color(180, 180, 180), "no data");
      }

      if (!isnan(id(outside_humidity).state)) {
        it.printf(40, 150, id(medium), Color(180, 180, 180), "%.0f%%", id(outside_humidity).state);
      } else {
        it.printf(40, 150, id(medium), Color(180, 180, 180), "no data");
      }

      if (!isnan(id(weather_wind_speed).state)) {
        it.image(100, 153, id(icon_weather_windy), Color(215, 185, 155), bg);
        it.printf(130, 150, id(medium), Color(180, 180, 180), "%.1f m/s", id(weather_wind_speed).state);
      }


      if (id(weather_state).has_state()) {
        auto s = id(weather_state).state;

        if (s == "sunny" || s == "clear-night") {
          it.image(10, 58, id(icon_weather_sunny), Color(0, 215, 255), bg);
        } else if (s == "cloudy" || s == "partlycloudy" || s == "overcast") {
          it.image(10, 58, id(icon_weather_cloudy), Color(240, 185, 115), bg);
        } else if (s == "rainy" || s == "pouring" || s == "lightning-rainy") {
          it.image(10, 58, id(icon_weather_rainy), Color(255, 170, 90), bg);
        } else if (s == "snowy" || s == "snowy-rainy") {
          it.image(10, 58, id(icon_weather_snowy), Color::WHITE, bg);
        } else if (s == "lightning") {
          it.image(10, 58, id(icon_weather_lightning), Color(255, 220, 80), bg);
        }
      } else {
        it.printf(10, 58, id(medium), Color(180, 180, 180), "no data");
      }
