substitutions:
  device_name: forecast-lab
  project_name: "forecast.lab"
  friendly_name: "Forecast Lab"
  version: "1.2.0"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: ${project_name}
    version: ${version}

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret forecast_api_key

ota:
  - platform: esphome
    password: !secret forecast_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Forecast-Lab Fallback Hotspot"
    password: !secret wifi_password

web_server:
  port: 80
  auth:
    username: !secret forecast_web_username
    password: !secret forecast_web_password

captive_portal:

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13

output:
  - platform: ledc
    pin: GPIO7
    id: bl_pwm

light:
  - platform: monochromatic
    output: bl_pwm
    name: "TFT Backlight"
    id: tft_backlight
    restore_mode: ALWAYS_ON

font:
  - file:
      type: gfonts
      family: Roboto
      weight: 900
    id: large
    size: 58
  - file: "gfonts://Roboto"
    id: medium
    size: 28
  - file: "gfonts://Roboto"
    id: small
    size: 20
